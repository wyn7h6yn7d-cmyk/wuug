<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Wuug">
  <defs>
    <!-- Same stops as `.gradient-sheen` (120deg) -->
    <linearGradient
      id="wuug-sheen"
      gradientUnits="userSpaceOnUse"
      x1="0"
      y1="0"
      x2="32"
      y2="0"
      gradientTransform="rotate(120 16 16)"
    >
      <stop offset="0%" stop-color="rgb(99, 102, 241)" />
      <stop offset="45%" stop-color="rgb(168, 85, 247)" />
      <stop offset="100%" stop-color="rgb(20, 184, 166)" />
    </linearGradient>
    <linearGradient id="wuug-dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgb(99, 102, 241)" />
      <stop offset="50%" stop-color="rgb(168, 85, 247)" />
      <stop offset="100%" stop-color="rgb(20, 184, 166)" />
    </linearGradient>
    <filter id="wuug-icon-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.75" flood-color="rgb(99, 102, 241)" flood-opacity="0.4" />
    </filter>
  </defs>
  <!-- BrandLogo: 36×36 rounded-2xl outer, inset 3, inner rx 12, 8×8 dot -->
  <rect width="32" height="32" rx="14.22" fill="url(#wuug-sheen)" filter="url(#wuug-icon-shadow)" />
  <rect x="2.67" y="2.67" width="26.66" height="26.66" rx="10.67" fill="rgb(255 255 255 / 0.85)" />
  <circle cx="16" cy="16" r="3.56" fill="url(#wuug-dot)" />
</svg>
